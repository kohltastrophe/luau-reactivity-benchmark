<svg xmlns="http://www.w3.org/2000/svg" width="960" height="287" viewBox="0 0 960 287" role="img" aria-label="Luau reactivity benchmark results, lower is faster"><defs><style>text{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}.bg{fill:#0000}.tt{fill:#11181c}.tm{fill:#697177}.tl{fill:#3a4248}.tw{fill:#fff}.grid{stroke:#e6e9ed;stroke-width:1;stroke-dasharray:2 4}.gridkey{stroke:#c3cbd2;stroke-width:1}.zebra{fill:#11181c;opacity:.022}.b{font-weight:700}.b6{font-weight:600}.e{text-anchor:end}.m{text-anchor:middle}.o9{opacity:.9}.o7{opacity:.72}.lnk{text-decoration:none;text-decoration-thickness:.6px;}.lnk:hover{fill:#11181c}.s95{font-size:9.5px}.s93{font-size:9.3px}.s85{font-size:8.5px}.s83{font-size:8.3px}.s11{font-size:11px}.s13{font-size:13px}.s125{font-size:12.5px}.dnf{fill:#9b1c1c;font-weight:700;paint-order:stroke;stroke:#f6e4e3;stroke-width:2.6px;stroke-linejoin:round}.dnfr{fill:url(#dnf);stroke:#d99b98;stroke-width:.8px}@media (prefers-color-scheme:dark){.tt{fill:#e6edf3}.tm{fill:#8b949e}.tl{fill:#c3cbd6}.grid{stroke:#21262d}.gridkey{stroke:#3a434d}.lnk:hover{fill:#e6edf3}.zebra{fill:#fff;opacity:.025}}</style><linearGradient id="capgrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff"/><stop offset="0.86" stop-color="#fff"/><stop offset="1" stop-color="#fff" stop-opacity="0.18"/></linearGradient><mask id="capfade" maskContentUnits="objectBoundingBox"><rect width="1" height="1" fill="url(#capgrad)"/></mask><pattern id="dnf" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="6" height="6" fill="#f6e4e3"/><line x1="0" y1="0" x2="0" y2="6" stroke="#d99b98" stroke-width="2"/></pattern></defs><rect x="0" y="0" width="960" height="287" class="bg"/><text x="0" y="16" font-size="23" font-weight="800" class="tt">Luau reactivity benchmark</text><text x="0" y="37" class="tm s125">headless luau <tspan class="mono">-O2</tspan>· per-bench process isolation · normalised per row to the fastest (shorter = faster)</text><text x="264.4" y="60" class="tm mono m s95">1×</text><text x="340.8" y="60" class="tm mono m s95">2×</text><text x="493.6" y="60" class="tm mono m s95">4×</text><text x="646.4" y="60" class="tm mono m s95">6×</text><text x="799.2" y="60" class="tm mono m s95">8×</text><text x="952.0" y="60" class="tm mono m s95">10×</text><text x="174" y="60" class="tm e s95">relative time, lower is faster →</text><text x="0" y="84" class="tl b s11" letter-spacing="0.5">OVERALL · GEOMETRIC MEAN</text><text x="952" y="84" class="tm e" font-size="10">over 22 of 22 rows · DNF charged its per-bench time cap</text><rect x="188" y="96" width="82.5" height="22" rx="4" fill="#D7397B"/><text x="176" y="111.5" class="tt b e s125"><a href="https://github.com/kohltastrophe/flux" class="lnk" target="_blank"><tspan class="tm">kohltastrophe/</tspan>flux</a><tspan class="tm s85" font-weight="500" dx="5">0.1.0</tspan></text><text x="198" y="111.5" class="tw b s125">1.08×</text><rect x="188" y="125" width="100.9" height="22" rx="4" fill="#C66300"/><text x="176" y="140.5" class="tt b e s125"><a href="https://github.com/centau/vide" class="lnk" target="_blank"><tspan class="tm">centau/</tspan>vide</a><tspan class="tm s85" font-weight="500" dx="5">0.4.0</tspan></text><text x="198" y="140.5" class="tw b s125">1.32×</text><rect x="188" y="154" width="127.0" height="22" rx="4" fill="#009C18"/><text x="176" y="169.5" class="tt b e s125"><a href="https://github.com/Roblox/signals" class="lnk" target="_blank"><tspan class="tm">roblox/</tspan>signals</a><tspan class="tm s85" font-weight="500" dx="5">0.9.0</tspan></text><text x="198" y="169.5" class="tw b s125">1.66×</text><rect x="188" y="183" width="132.2" height="22" rx="4" fill="#0098CB"/><text x="176" y="198.5" class="tt b e s125"><a href="https://github.com/littensy/charm" class="lnk" target="_blank"><tspan class="tm">littensy/</tspan>charm</a><tspan class="tm s85" font-weight="500" dx="5">0.11.0</tspan></text><text x="198" y="198.5" class="tw b s125">1.73×</text><rect x="188" y="212" width="764.0" height="22" rx="4" fill="#7F63EE" mask="url(#capfade)"/><text x="176" y="227.5" class="tt b e s125"><a href="https://github.com/elttob/fusion" class="lnk" target="_blank"><tspan class="tm">elttob/</tspan>fusion</a><tspan class="tm s85" font-weight="500" dx="5">0.3.0</tspan></text><text x="198" y="227.5" class="tw b s125">14.84×</text><text x="0" y="262" class="tm s95">Port of <a href="https://github.com/milomg/js-reactivity-benchmark" class="lnk">milomg/js-reactivity-benchmark</a> · normalised per row to the fastest framework (1.0×, shorter = faster) · process-isolated, fastest-of-N per run.</text><text x="0" y="276" class="tm s95">Faded bars exceed 10× (true multiple labelled) · a DNF is charged its benchmark's time budget (per-bench cap, else the 60s process cap) in the geomean (an unexpected error is excluded instead).</text></svg>
